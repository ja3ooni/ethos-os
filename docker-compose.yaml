version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ETHOS_DB_URL=sqlite:///./ethos_os.db
      - ETHOS_QDRANT_URL=http://qdrant:6333
    volumes:
      - ./ethos_os.db:/app/ethos_os.db
    depends_on:
      - qdrant
    command: python -m ethos_os.main

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage: